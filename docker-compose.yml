services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r backend/requirements.txt
      && flask --app backend.app db upgrade
      && flask --app backend.app run --host=0.0.0.0 --port=5000"
    volumes:
      - .:/app
    environment:
      FLASK_ENV: production
      DATABASE_URL: sqlite:////app/backend/instance/market_scanner.db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173
      ENABLE_SCAN_TEMPLATE_SCHEDULER: "true"
      SCAN_TEMPLATE_EVALUATION_INTERVAL_SECONDS: "${SCAN_TEMPLATE_EVALUATION_INTERVAL_SECONDS:-900}"
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r backend/requirements.txt
      && flask --app backend.app db upgrade
      && rq worker scans --url redis://redis:6379/0"
    volumes:
      - .:/app
    environment:
      FLASK_ENV: production
      DATABASE_URL: sqlite:////app/backend/instance/market_scanner.db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173
      SCAN_TEMPLATE_EVALUATION_INTERVAL_SECONDS: "${SCAN_TEMPLATE_EVALUATION_INTERVAL_SECONDS:-900}"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  scheduler:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r backend/requirements.txt
      && flask --app backend.app db upgrade
      && rq worker --with-scheduler scans --url redis://redis:6379/0"
    volumes:
      - .:/app
    environment:
      FLASK_ENV: production
      DATABASE_URL: sqlite:////app/backend/instance/market_scanner.db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173
      ENABLE_SCAN_TEMPLATE_SCHEDULER: "true"
      SCAN_TEMPLATE_EVALUATION_INTERVAL_SECONDS: "${SCAN_TEMPLATE_EVALUATION_INTERVAL_SECONDS:-900}"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - .:/app
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-5000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started

volumes:
  redis-data:
