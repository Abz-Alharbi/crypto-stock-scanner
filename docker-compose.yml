services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r backend/requirements.txt
      && flask --app backend.app db upgrade
      && flask --app backend.app run --host=0.0.0.0 --port=5000"
    volumes:
      - .:/app
    environment:
      FLASK_ENV: production
      DATABASE_URL: sqlite:////app/backend/instance/market_scanner.db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r backend/requirements.txt
      && flask --app backend.app db upgrade
      && rq worker scans --url redis://redis:6379/0"
    volumes:
      - .:/app
    environment:
      FLASK_ENV: production
      DATABASE_URL: sqlite:////app/backend/instance/market_scanner.db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
